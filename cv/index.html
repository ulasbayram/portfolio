<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CV Access | Ulaş Bayram</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --holo-gradient: linear-gradient(120deg, rgba(255, 120, 180, 0.9) 0%, rgba(160, 80, 255, 0.9) 50%, rgba(80, 240, 255, 0.9) 100%);
        }
        body {
            background: #FAFAFA;
            color: #0F0F0F;
            font-family: 'Space Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
            position: relative;
        }
        body.dark-mode {
            background: #0F0F0F;
            color: #FAFAFA;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--holo-gradient);
            opacity: 0.05;
            mix-blend-mode: color-burn;
            pointer-events: none;
            z-index: 0;
        }
        .content {
            z-index: 10;
            background: #FFFFFF;
            padding: 4rem;
            border: 3px solid #0F0F0F;
            box-shadow: 10px 10px 0px 0px #0F0F0F;
            position: relative;
        }
        body.dark-mode .content {
            background: #121212;
            border-color: #FAFAFA;
            box-shadow: 10px 10px 0px 0px #FAFAFA;
        }
        .content::before {
            content: 'XXX';
            position: absolute;
            top: 1rem; right: 1rem;
            opacity: 0.2;
            font-weight: bold;
        }
        .loading {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: bold;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        .barcode {
            font-size: 3rem;
            opacity: 0.2;
            letter-spacing: -5px;
            margin-bottom: 2rem;
        }
        .holo-bar {
            width: 100%;
            height: 6px;
            background: var(--holo-gradient);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(80, 240, 255, 0.5);
        }
        .holo-bar::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            animation: load 2s cubic-bezier(0.19, 1, 0.22, 1) infinite;
        }
        @keyframes load {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <div class="barcode">||| || | | |||| | ||</div>
        <div class="loading">INITIALIZING SECURE CV DOWNLOAD...</div>
        <div class="holo-bar"></div>
        <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.7;">Redirecting to document in 3 seconds.</p>
    </div>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
        
        setTimeout(() => {
            // Placeholder for actual CV PDF
            window.location.href = '/cv.pdf';
        }, 3000);
    </script>
</body>
</html>
